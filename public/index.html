<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA Account Health Reports</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e8eaf0;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  /* Password gate */
  #gate {
    width: 100%; max-width: 380px;
    background: #1a1d26; border: 1px solid #2e3348; border-radius: 12px;
    padding: 36px 32px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #gate h1 { font-size: 18px; font-weight: 700; color: #fff; }
  #gate .sub { font-size: 13px; color: #7a849e; margin-top: -8px; }
  #gate input {
    width: 100%; padding: 11px 14px;
    background: #0f1117; border: 1px solid #2e3348; border-radius: 8px;
    color: #e8eaf0; font-size: 15px; letter-spacing: 2px;
    outline: none; transition: border-color 0.15s;
  }
  #gate input:focus { border-color: #4f6ef7; }
  #gate input.error { border-color: #e74c3c; animation: shake 0.3s; }
  #gate button {
    width: 100%; padding: 11px;
    background: #4f6ef7; border: none; border-radius: 8px;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  #gate button:hover { background: #3d5ce0; }
  #gate .err-msg { font-size: 12px; color: #ff7675; text-align: center; min-height: 16px; }

  /* Reports list (shown after auth) */
  #reports {
    display: none;
    width: 100%; max-width: 700px;
    flex-direction: column; gap: 0;
  }
  #reports h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  #reports .sub { color: #7a849e; font-size: 13px; margin-bottom: 28px; }
  .report-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .report-list li a {
    display: flex; justify-content: space-between; align-items: center;
    background: #1a1d26; border: 1px solid #2e3348; border-radius: 8px;
    padding: 14px 18px; color: #e8eaf0; text-decoration: none; font-size: 14px;
  }
  .report-list li a:hover { border-color: #4f6ef7; }
  .report-list li a .date { font-size: 11px; color: #7a849e; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<!-- Password gate -->
<div id="gate">
  <h1>GA Account Health</h1>
  <p class="sub">Internal reports — Growth Assistant</p>
  <input type="password" id="pw" placeholder="Password" autocomplete="current-password" />
  <button onclick="checkPw()">Enter</button>
  <div class="err-msg" id="err"></div>
</div>

<!-- Reports (shown after auth) -->
<div id="reports">
  <h1>GA Account Health Reports</h1>
  <div class="sub">Internal — Growth Assistant · Generated by /account-health skill</div>
  <ul class="report-list">
    <li><a href="/acceleration-partners"><span>Acceleration Partners</span><span class="date">Jun 19, 2026</span></a></li>
  </ul>
</div>

<script>
  const PASS = 'ga2026';

  function checkPw() {
    const val = document.getElementById('pw').value.trim().toLowerCase();
    if (val === PASS) {
      sessionStorage.setItem('ga_auth', '1');
      showReports();
    } else {
      const inp = document.getElementById('pw');
      inp.classList.add('error');
      document.getElementById('err').textContent = 'Incorrect password.';
      setTimeout(() => inp.classList.remove('error'), 400);
    }
  }

  function showReports() {
    document.getElementById('gate').style.display = 'none';
    const r = document.getElementById('reports');
    r.style.display = 'flex';
  }

  // Allow Enter key
  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPw();
  });

  // If already authed this session, skip gate
  if (sessionStorage.getItem('ga_auth') === '1') showReports();
</script>

</body>
</html>
